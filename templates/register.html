<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — TaskFlow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <span class="auth-logo-text">TaskFlow</span>
      </div>
      <h2 class="auth-title">Регистрация</h2>
      <p class="auth-desc">Создайте аккаунт для работы в системе</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
          <label class="form-label">ФИО <span class="required">*</span></label>
          <input type="text" name="full_name" class="form-input" placeholder="Иванов Иван Иванович" required />
        </div>
        <div class="form-group">
          <label class="form-label">Логин <span class="required">*</span></label>
          <input type="text" name="username" class="form-input" placeholder="ivanov_ivan" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="ivanov@company.ru" />
        </div>
        <div class="form-group">
          <label class="form-label">Пароль <span class="required">*</span></label>
          <input type="password" name="password" class="form-input" placeholder="Минимум 6 символов" required minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label">Роль</label>
          <select name="role" class="form-input form-select">
            <option value="employee">Исполнитель</option>
            <option value="manager">Руководитель</option>
          </select>
        </div>
        <button type="submit" class="btn-primary btn-block">Создать аккаунт</button>
      </form>

      <p class="auth-switch">Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a></p>
    </div>
  </div>
</body>
</html>
